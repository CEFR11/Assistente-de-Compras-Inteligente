<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistente de Compras</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080810;
    --surface: #111120;
    --card: #16162a;
    --border: #ffffff0f;
    --accent: #6c63ff;
    --accent-glow: #6c63ff40;
    --text: #f0f0ff;
    --muted: #7070a0;
    --green: #4ade80;
    --amber: #fbbf24;
    --purple: #a78bfa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 64px 20px 80px;
    overflow-x: hidden;
  }

  /* fundo com grade sutil */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  /* brilho central */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, #6c63ff18 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 580px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── hero ── */
  .hero { text-align: center; margin-bottom: 48px; }

  .pill {
    display: inline-block;
    font-size: .7rem;
    font-weight: 500;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent-glow);
    border-radius: 20px;
    padding: 4px 14px;
    margin-bottom: 20px;
    background: #6c63ff10;
  }

  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.2rem, 6vw, 3rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1.5px;
    margin-bottom: 12px;
  }

  .hero h1 span {
    background: linear-gradient(135deg, #a78bfa, #6c63ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .hero p {
    color: var(--muted);
    font-size: .95rem;
    font-weight: 300;
    line-height: 1.6;
  }

  /* ── search ── */
  .search-box {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 6px 6px 6px 20px;
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 12px;
    transition: border-color .2s, box-shadow .2s;
  }

  .search-box:focus-within {
    border-color: #6c63ff60;
    box-shadow: 0 0 0 4px #6c63ff12;
  }

  .search-box input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Outfit', sans-serif;
    font-size: .95rem;
    color: var(--text);
    padding: 8px 0;
  }

  .search-box input::placeholder { color: var(--muted); }

  .search-box button {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    padding: 10px 22px;
    color: #fff;
    font-family: 'Outfit', sans-serif;
    font-size: .9rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    white-space: nowrap;
  }

  .search-box button:hover { opacity: .88; }
  .search-box button:active { transform: scale(.97); }

  /* sugestões */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin-bottom: 40px;
  }

  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 13px;
    font-size: .78rem;
    color: var(--muted);
    cursor: pointer;
    transition: color .15s, border-color .15s;
  }

  .chip:hover { color: var(--text); border-color: #6c63ff60; }

  /* ── resultados ── */
  #resultados { width: 100%; }

  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .result-header span {
    font-size: .78rem;
    color: var(--muted);
    font-weight: 300;
  }

  .result-header strong {
    font-size: .82rem;
    color: var(--text);
    font-weight: 500;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    cursor: default;
    transition: border-color .2s, transform .15s;
    animation: slideUp .3s ease both;
  }

  .card:hover { border-color: #6c63ff40; transform: translateY(-2px); }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:nth-child(2) { animation-delay: .05s }
  .card:nth-child(3) { animation-delay: .10s }
  .card:nth-child(4) { animation-delay: .15s }
  .card:nth-child(5) { animation-delay: .20s }

  .card-left { display: flex; align-items: center; gap: 14px; }

  .card-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
  }

  .card-nome {
    font-weight: 500;
    font-size: .95rem;
    margin-bottom: 5px;
  }

  .card-meta { display: flex; gap: 6px; align-items: center; }

  .cat {
    font-size: .72rem;
    color: var(--muted);
    font-weight: 300;
  }

  .tag {
    font-size: .68rem;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
  }

  .tag-baixo  { background: #4ade8015; color: #4ade80; }
  .tag-medio  { background: #fbbf2415; color: #fbbf24; }
  .tag-alto   { background: #a78bfa15; color: #a78bfa; }

  .card-preco {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
  }

  /* empty / msg */
  #mensagem {
    text-align: center;
    padding: 48px 0;
    color: var(--muted);
    font-size: .9rem;
    font-weight: 300;
  }

  .empty-icon { font-size: 2rem; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="hero">
    <div class="pill">Prog. II — 2025</div>
    <h1>Encontre o que<br>você <span>precisa</span></h1>
    <p>Busca em linguagem natural, resultados inteligentes.</p>
  </div>

  <div class="search-box">
    <input id="input" type="text" placeholder="ex: celular barato com boa câmera…" />
    <button onclick="buscar()">Buscar</button>
  </div>

  <div class="chips">
    <div class="chip" onclick="fill('celular barato')">celular barato</div>
    <div class="chip" onclick="fill('notebook para trabalho')">notebook trabalho</div>
    <div class="chip" onclick="fill('fone premium')">fone premium</div>
    <div class="chip" onclick="fill('tv grande barata')">tv grande</div>
  </div>

  <div id="resultados">
    <div id="mensagem">
      <div class="empty-icon">🔍</div>
      Digite algo para começar.
    </div>
  </div>

</div>

<script>
  const icones = { celular:'📱', notebook:'💻', fone:'🎧', tv:'📺' };
  const labelPreco = { baixo:'Econômico', medio:'Médio', alto:'Premium' };

  function buscar() {
    const q = document.getElementById('input').value.trim();
    if (!q) return;

    const div = document.getElementById('resultados');
    div.innerHTML = '<div id="mensagem">Buscando...</div>';

    fetch(`http://localhost:8000/buscar?q=${encodeURIComponent(q)}`)
      .then(r => r.json())
      .then(dados => {
        if (!dados.length) {
          div.innerHTML = '<div id="mensagem"><div class="empty-icon">😕</div>Nenhum produto encontrado.</div>';
          return;
        }
        div.innerHTML = `
          <div class="result-header">
            <strong>${dados.length} resultado${dados.length > 1 ? 's' : ''}</strong>
            <span>ordenado por relevância</span>
          </div>
          ${dados.map(p => `
            <div class="card">
              <div class="card-left">
                <div class="card-icon">${icones[p.categoria] || '📦'}</div>
                <div>
                  <div class="card-nome">${p.nome}</div>
                  <div class="card-meta">
                    <span class="cat">${p.categoria}</span>
                    <span class="tag tag-${p.preco}">${labelPreco[p.preco]}</span>
                  </div>
                </div>
              </div>
              <div class="card-preco">R$ ${p.valor.toFixed(2)}</div>
            </div>
          `).join('')}`;
      })
      .catch(() => {
        div.innerHTML = '<div id="mensagem">Erro ao conectar com o servidor.</div>';
      });
  }

  function fill(txt) {
    document.getElementById('input').value = txt;
    buscar();
  }

  document.getElementById('input').addEventListener('keydown', e => {
    if (e.key === 'Enter') buscar();
  });
</script>
</body>
</html>
